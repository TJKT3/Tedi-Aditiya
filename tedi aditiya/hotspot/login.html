<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selamat Datang di Hotspot Tedi Aditiya</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .ie-fixMinHeight {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main .wrap {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700, 0 0 20px #fff;
        }

        .info {
            margin-bottom: 20px;
            font-size: 14px;
        }

        form label {
            display: block;
            position: relative;
            margin-bottom: 20px;
        }

        form input[type="text"],
        form input[type="password"] {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .ico {
            position: absolute;
            top: 12px;
            right: 10px;
            width: 20px;
            opacity: 0.7;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #ffcc00;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #ffd700;
            box-shadow: 0 0 20px #ffd700;
        }

        /* Lightning effect */
        .lightning {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, #fff, rgba(255, 255, 255, 0));
            left: 50%;
            top: -100px;
            animation: strike 2s infinite;
        }

        @keyframes strike {
            0% {
                transform: translateX(-50%) rotate(0deg);
                opacity: 0;
            }

            20% {
                opacity: 1;
                transform: translateX(-50%) rotate(20deg);
            }

            40% {
                opacity: 0;
            }

            60% {
                opacity: 0;
            }

            80% {
                opacity: 1;
                transform: translateX(-50%) rotate(-15deg);
            }

            100% {
                opacity: 0;
            }
        }

        .powered {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div class="lightning"></div>

    <!-- Hidden CHAP form -->
    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>
    <script src="/md5.js"></script>
    <script>
        function doLogin() {
            document.sendin.username.value = document.login.username.value;
            document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }
    </script>
    $(endif)

    <div class="ie-fixMinHeight">
        <div class="main">
            <div class="wrap">

                <h1>Selamat Datang di Hotspot Tedi Aditiya</h1>

                <form name="login" action="$(link-login-only)" method="post" $(if chap-id) onSubmit="return doLogin()" $(endif)>
                    <input type="hidden" name="dst" value="$(link-orig)" />
                    <input type="hidden" name="popup" value="true" />

                    <p class="info $(if error)alert$(endif)">
                        $(if error == "")Silakan login untuk mengakses internet hotspot.$(endif)
                        $(if error)$(error)$(endif)
                    </p>

                    <label>
                        <input name="username" type="text" value="$(username)" placeholder="Username" />
                        <img class="ico" src="img/user.svg" alt="User" />
                    </label>

                    <label>
                        <input name="password" type="password" placeholder="Password" />
                        <img class="ico" src="img/password.svg" alt="Password" />
                    </label>

                    <input type="submit" value="Connect" />
                </form>

                <p class="powered">Powered by MikroTik RouterOS</p>
            </div>
        </div>
    </div>

</body>

</html>
